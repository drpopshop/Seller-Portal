  <style>
    .no-scrollbar::-webkit-scrollbar {

    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    body {

      color: #1d1d1f;
      -webkit-font-smoothing: antialiased;
      font-family: 'Inter', -apple-system, sans-serif;
    }
    .btn-active:active {
      transform: scale(0.95);
      transition: transform 0.15s ease;
    }
    .dropdown-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .dropdown-scroll::-webkit-scrollbar-track {
      background: #fafafc;
    }
    .dropdown-scroll::-webkit-scrollbar-thumb {
      background-color: #d2d2d7;
      border-radius: 10px;
    }
    .glass-nav {
      background-color: rgba(255, 255, 255, 0.85);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
    }
    .confirm-bounce {
      animation: bounceMicro 0.4s ease-out;
    }
    @keyframes bounceMicro {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(0.97); }
    }
    .fade-in {
      animation: fadeIn 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }

    const calculateVolumetricTierPrice = (qty) => {
      if (qty <= 0) return 0;
      const groupsOfThree = Math.floor(qty / 3);
      const remainder = qty % 3;
      
      let price = groupsOfThree * 900;
      if (remainder === 1) {
        price += 450;
      } else if (remainder === 2) {
        price += 700;
      }
      return price;
    };

    function SwipeableItem({ children, onDelete, uniqueId }) {
      const [startX, setStartX] = useState(0);
      const [currentOffset, setCurrentOffset] = useState(0);
      const [isSwiping, setIsSwiping] = useState(false);
      const [isOpen, setIsOpen] = useState(false);
      const [isDeleting, setIsDeleting] = useState(false);

      const maxSwipe = 85; 

      const handleTouchStart = (e) => {
        setStartX(e.touches[0].clientX);
        setIsSwiping(true);
      };

      const handleTouchMove = (e) => {
        if (!isSwiping) return;
        const currentX = e.touches[0].clientX;
        const diffX = currentX - startX;
        
        let newOffset = isOpen ? -maxSwipe + diffX : diffX;
        
        if (newOffset > 10) newOffset = 10;
        if (newOffset < -220) newOffset = -220;

        setCurrentOffset(newOffset);
      };

      const handleTouchEnd = () => {
        setIsSwiping(false);
        if (currentOffset < -170) {
          triggerFullSwipeDelete();
        } else if (currentOffset < -45) {
          setCurrentOffset(-maxSwipe);
          setIsOpen(true);
        } else {
          setCurrentOffset(0);
          setIsOpen(false);
        }
      };

      const handleMouseDown = (e) => {
        setStartX(e.clientX);
        setIsSwiping(true);
      };

      const handleMouseMove = (e) => {
        if (!isSwiping) return;
        const currentX = e.clientX;
        const diffX = currentX - startX;
        
        let newOffset = isOpen ? -maxSwipe + diffX : diffX;
        if (newOffset > 10) newOffset = 10;
        if (newOffset < -220) newOffset = -220;

        setCurrentOffset(newOffset);
      };

      const handleMouseUp = () => {
        if (!isSwiping) return;
        setIsSwiping(false);
        if (currentOffset < -170) {
          triggerFullSwipeDelete();
        } else if (currentOffset < -45) {
          setCurrentOffset(-maxSwipe);
          setIsOpen(true);
        } else {
          setCurrentOffset(0);
          setIsOpen(false);
        }
      };

      const triggerFullSwipeDelete = () => {
        setIsDeleting(true);
        setCurrentOffset(-550); 
        setTimeout(() => {
          onDelete();
        }, 250);
      };

      return (
        <div 
          className={`relative overflow-hidden w-full transition-all duration-300 ${
            isDeleting ? 'max-h-0 opacity-0 my-0 py-0 border-0' : 'max-h-[160px] my-1.5'
          }`}
        >
          {/* Back Action Layer */}
          <div

            <i className="fa-solid fa-trash-can text-lg mb-1 animate-pulse"></i>
            <span className="text-[10px] uppercase tracking-widest font-extrabold">Delete</span>
          </div>

          {/* Front Sliding Container */}
          <div 
            onTouchStart={handleTouchStart}
            onTouchMove={handleTouchMove}
            onTouchEnd={handleTouchEnd}
            onMouseDown={handleMouseDown}
            onMouseMove={handleMouseMove}
            onMouseUp={handleMouseUp}
            onMouseLeave={handleMouseUp}
            style={{ 
              transform: `translateX(${currentOffset}px)`,
              transition: isSwiping ? 'none' : 'transform 0.25s cubic-bezier(0.16, 1, 0.3, 1)'
            }}
            className="relative z-20 cursor-grab active:cursor-grabbing select-none"
          >
            {children}
          </div>
        </div>
      );
    }
